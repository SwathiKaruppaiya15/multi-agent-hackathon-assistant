spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  datasource:
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 60000
      max-lifetime: 120000
      keepalive-time: 30000
      data-source-properties:
        sslmode: require
        ssl: true

  websocket:
    allowed-origins: "${FRONTEND_URL:https://hackpilot-ai.vercel.app},https://*.vercel.app"

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.hackpilot: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
